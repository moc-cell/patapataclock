<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Flip Clock</title>

<style>
  html, body {
    margin: 0;
    padding: 0;
    background: transparent;
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
  }

  .clock {
    display: flex;
    gap: 4px;
  }

  .digit {
    position: relative;
    width: 40px;
    height: 60px;
    perspective: 300px;
  }

  /* 上下共通 */
  .half {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  color: #555;
  background: #FDF5E6;
  text-align: center;
  font-size: 36px;
  line-height: 30px; /* ← 半分にするのがポイント */
}

  .top {
    top: 0;
    border-bottom: 1px solid rgba(0,0,0,0.1); /* ← 折れ目 */
  }

  .bottom {
    bottom: 0;
    line-height: 0;
  }

  /* 中身をズラして上下で1文字にする */
  .top span {
  transform: translateY(4px);
}

.bottom span {
  transform: translateY(-50%);
}

  .bottom span {
    display: block;
    transform: translateY(-50%);
  }

  /* アニメーション用 */
  .flip-top {
    transform-origin: bottom;
    animation: flipTop 0.4s forwards;
  }

  .flip-bottom {
    transform-origin: top;
    animation: flipBottom 0.4s forwards;
  }

  @keyframes flipTop {
    0% { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }

  @keyframes flipBottom {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
</style>
</head>

<body>
<div class="clock" id="clock"></div>

<script>
const clock = document.getElementById("clock");
let prev = "";

function createDigit(n) {
  const digit = document.createElement("div");
  digit.className = "digit";

  const top = document.createElement("div");
  top.className = "half top";
  top.innerHTML = "<span>" + n + "</span>";

  const bottom = document.createElement("div");
  bottom.className = "half bottom";
  bottom.innerHTML = "<span>" + n + "</span>";

  digit.appendChild(top);
  digit.appendChild(bottom);

  return digit;
}

function updateClock() {
  const now = new Date();
  const time =
    String(now.getHours()).padStart(2,"0") +
    String(now.getMinutes()).padStart(2,"0");

  if (!prev) {
    clock.innerHTML = "";
    time.split("").forEach(n => clock.appendChild(createDigit(n)));
  } else {
    time.split("").forEach((n,i) => {
      if (n !== prev[i]) {
        const digit = clock.children[i];
        const top = digit.querySelector(".top span");
        const bottom = digit.querySelector(".bottom span");

        const newTop = digit.querySelector(".top");
        const newBottom = digit.querySelector(".bottom");

        newTop.classList.add("flip-top");
        newBottom.classList.add("flip-bottom");

        setTimeout(() => {
          top.textContent = n;
          bottom.textContent = n;
          newTop.classList.remove("flip-top");
          newBottom.classList.remove("flip-bottom");
        }, 200);
      }
    });
  }

  prev = time;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent; /* or #FDF5E6 */
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
  }

  .clock {
    display: flex;
    gap: 2px;
  }

  .digit {
    position: relative;
    width: 28px;
    height: 40px;
    perspective: 200px;
  }

  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    color: #555555;
    font-size: 26px;
    font-weight: 500;
    text-align: center;
    line-height: 40px;
    background: #FDF5E6;
    border-radius: 4px;
    backface-visibility: hidden;
  }

  .top {
    transform-origin: bottom;
  }

  .bottom {
    transform-origin: top;
  }

  .flip .top {
    animation: flipTop 0.4s forwards;
  }

  .flip .bottom {
    animation: flipBottom 0.4s forwards;
  }

  @keyframes flipTop {
    0% { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }

  @keyframes flipBottom {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
</style>
</head>

<body>
<div class="clock" id="clock"></div>

<script>
  const clock = document.getElementById("clock");
  let prevTime = "";

  function createDigit(num) {
    const digit = document.createElement("div");
    digit.className = "digit";

    const top = document.createElement("div");
    top.className = "card top";
    top.textContent = num;

    const bottom = document.createElement("div");
    bottom.className = "card bottom";
    bottom.textContent = num;

    digit.appendChild(top);
    digit.appendChild(bottom);

    return digit;
  }

  function updateClock() {
    const now = new Date();
    const time =
      String(now.getHours()).padStart(2, "0") +
      String(now.getMinutes()).padStart(2, "0");

    if (!prevTime) {
      clock.innerHTML = "";
      time.split("").forEach(n => clock.appendChild(createDigit(n)));
    } else {
      time.split("").forEach((n, i) => {
        if (n !== prevTime[i]) {
          const digit = clock.children[i];
          digit.classList.add("flip");

          const top = digit.querySelector(".top");
          const bottom = digit.querySelector(".bottom");

          setTimeout(() => {
            top.textContent = n;
            bottom.textContent = n;
            digit.classList.remove("flip");
          }, 200);
        }
      });
    }

    prevTime = time;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
