<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Flip Clock</title>

<style>
  * {
    box-sizing: border-box;
  }

  html, body {
    margin: 0;
    padding: 0;
    background: transparent; /* or #FDF5E6 */
    overflow: hidden;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: sans-serif;
  }

  .clock {
    display: flex;
    gap: 2px;
  }

  .digit {
    position: relative;
    width: 28px;
    height: 40px;
    perspective: 200px;
  }

  .card {
    position: absolute;
    width: 100%;
    height: 100%;
    color: #555555;
    font-size: 26px;
    font-weight: 500;
    text-align: center;
    line-height: 40px;
    background: #FDF5E6;
    border-radius: 4px;
    backface-visibility: hidden;
  }

  .top {
    transform-origin: bottom;
  }

  .bottom {
    transform-origin: top;
  }

  .flip .top {
    animation: flipTop 0.4s forwards;
  }

  .flip .bottom {
    animation: flipBottom 0.4s forwards;
  }

  @keyframes flipTop {
    0% { transform: rotateX(0); }
    100% { transform: rotateX(-90deg); }
  }

  @keyframes flipBottom {
    0% { transform: rotateX(90deg); }
    100% { transform: rotateX(0); }
  }
</style>
</head>

<body>
<div class="clock" id="clock"></div>

<script>
  const clock = document.getElementById("clock");
  let prevTime = "";

  function createDigit(num) {
    const digit = document.createElement("div");
    digit.className = "digit";

    const top = document.createElement("div");
    top.className = "card top";
    top.textContent = num;

    const bottom = document.createElement("div");
    bottom.className = "card bottom";
    bottom.textContent = num;

    digit.appendChild(top);
    digit.appendChild(bottom);

    return digit;
  }

  function updateClock() {
    const now = new Date();
    const time =
      String(now.getHours()).padStart(2, "0") +
      String(now.getMinutes()).padStart(2, "0");

    if (!prevTime) {
      clock.innerHTML = "";
      time.split("").forEach(n => clock.appendChild(createDigit(n)));
    } else {
      time.split("").forEach((n, i) => {
        if (n !== prevTime[i]) {
          const digit = clock.children[i];
          digit.classList.add("flip");

          const top = digit.querySelector(".top");
          const bottom = digit.querySelector(".bottom");

          setTimeout(() => {
            top.textContent = n;
            bottom.textContent = n;
            digit.classList.remove("flip");
          }, 200);
        }
      });
    }

    prevTime = time;
  }

  setInterval(updateClock, 1000);
  updateClock();
</script>
</body>
</html>
