<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Flip Clock</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  background: transparent;
  overflow: hidden;
  height: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: sans-serif;
}

.clock {
  display: flex;
  gap: 4px;
}

.digit {
  position: relative;
  width: 40px;
  height: 60px;
  perspective: 300px;
}

/* 上下共通 */
.half {
  position: absolute;
  width: 100%;
  height: 50%;
  overflow: hidden;
  background: #FDF5E6;
  color: #555;
  text-align: center;
}

/* 上 */
.top {
  top: 0;
  border-bottom: 1px solid rgba(0,0,0,0.15);
}

/* 下 */
.bottom {
  bottom: 0;
}

/* 文字（ここが重要） */
.half span {
  display: block;
  font-size: 36px;
  height: 60px;        /* 全体高さと同じにする */
  line-height: 60px;   /* 中央揃えの基準 */
}

/* 上側の見え方 */
.top span {
  transform: translateY(8px); /* ← ここが効く */
}

/* 下側の見え方 */
.bottom span {
  transform: translateY(-30px); /* 半分だけ上にずらす */
}

/* アニメーション */
.flip-top {
  transform-origin: bottom;
  animation: flipTop 0.4s forwards;
}

.flip-bottom {
  transform-origin: top;
  animation: flipBottom 0.4s forwards;
}

@keyframes flipTop {
  0% { transform: rotateX(0); }
  100% { transform: rotateX(-90deg); }
}

@keyframes flipBottom {
  0% { transform: rotateX(90deg); }
  100% { transform: rotateX(0); }
}
</style>
</head>

<body>
<div class="clock" id="clock"></div>

<script>
const clock = document.getElementById("clock");
let prev = "";

function createDigit(n) {
  const digit = document.createElement("div");
  digit.className = "digit";

  const top = document.createElement("div");
  top.className = "half top";
  top.innerHTML = "<span>" + n + "</span>";

  const bottom = document.createElement("div");
  bottom.className = "half bottom";
  bottom.innerHTML = "<span>" + n + "</span>";

  digit.appendChild(top);
  digit.appendChild(bottom);

  return digit;
}

function updateClock() {
  const now = new Date();
  const time =
    String(now.getHours()).padStart(2,"0") +
    String(now.getMinutes()).padStart(2,"0");

  if (!prev) {
    clock.innerHTML = "";
    time.split("").forEach(n => clock.appendChild(createDigit(n)));
  } else {
    time.split("").forEach((n,i) => {
      if (n !== prev[i]) {
        const digit = clock.children[i];
        const top = digit.querySelector(".top");
        const bottom = digit.querySelector(".bottom");

        const topSpan = digit.querySelector(".top span");
        const bottomSpan = digit.querySelector(".bottom span");

        top.classList.add("flip-top");
        bottom.classList.add("flip-bottom");

        setTimeout(() => {
          topSpan.textContent = n;
          bottomSpan.textContent = n;
          top.classList.remove("flip-top");
          bottom.classList.remove("flip-bottom");
        }, 200);
      }
    });
  }

  prev = time;
}

setInterval(updateClock, 1000);
updateClock();
</script>
</body>
</html>
